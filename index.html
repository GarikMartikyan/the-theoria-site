<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Theoria</title>
<style>
  :root { --bg:#0A0A0A; --panel:#141414; --accent:#93F47E; --text:#F5F5F5; --text-dim:#6f6f6f; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, "Inter", "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem; text-align: center;
  }
  .badge {
    display: inline-flex; flex-direction: column; align-items: center; gap: 0.4rem;
    border: 2px solid var(--accent); border-radius: 16px; padding: 1.25rem 2rem; margin-bottom: 1.5rem;
  }
  .badge .the { color: var(--text-dim); font-size: 0.9rem; letter-spacing: 0.2em; }
  .badge .divider { width: 100%; height: 2px; background: var(--accent); }
  .badge .theoria {
    font-family: "Archivo Black", -apple-system, sans-serif; font-weight: 900;
    font-size: 1.75rem; letter-spacing: 0.05em; color: var(--text);
  }
  p.tagline { font-size: 1.1rem; color: var(--text); max-width: 32rem; margin: 0 0 2rem; }
  .links { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; margin-bottom: 3rem; }
  .links a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .links a:hover { text-decoration: underline; }
  footer { color: var(--text-dim); font-size: 0.85rem; }
  footer a { color: var(--text-dim); }
</style>
</head>
<body>
  <div class="badge">
    <span class="the">THE</span>
    <span class="divider"></span>
    <span class="theoria">THEORIA</span>
  </div>
  <p class="tagline">Answers you've always wondered about.<br>Short, fact-checked videos that explain the world's hidden mechanics.</p>
  <div class="links">
    <a href="https://www.youtube.com/@its.thetheoria" target="_blank" rel="noopener">YouTube</a>
    <a href="https://www.instagram.com/its.thetheoria" target="_blank" rel="noopener">Instagram</a>
    <a href="https://www.tiktok.com/@its.thetheoria" target="_blank" rel="noopener">TikTok</a>
  </div>
  <footer>
    <a href="./terms.html">Terms of Service</a> &nbsp;·&nbsp; <a href="./privacy.html">Privacy Policy</a>
    <br>&copy; 2026 The Theoria
  </footer>
</body>
</html>
